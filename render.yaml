services:
  - type: web
    name: email-sender
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: YOUR_NAME
        sync: false
      - key: YOUR_EMAIL
        sync: false
      - key: YOUR_PASSWORD
        sync: false
      - key: YOUR_PHONE
        sync: false
      - key: YOUR_LINKEDIN
        sync: false
      - key: YOUR_WEBSITE
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_SERVICE
        value: sendgrid
      - key: PYTHON_VERSION
        value: 3.11.0
